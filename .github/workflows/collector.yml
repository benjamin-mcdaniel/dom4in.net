name: Collector

# Scheduled short-mode collector runs.
# Cadence: 3x/day at 06/14/22 UTC. Also exposed as workflow_dispatch.
# Each run is bounded by block count (not wall-clock), so clean exits are
# reported as status=success instead of partial.

on:
  schedule:
    - cron: '0 6,14,22 * * *'
  workflow_dispatch:
    inputs:
      blocks:
        description: 'Stop after N blocks (0 = unlimited)'
        required: false
        default: '10'
      api_base:
        description: 'Override API base URL'
        required: false
        default: 'https://dom4in.net'

# Prevent overlapping runs — queued run waits rather than stepping on pointer state.
concurrency:
  group: collector
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    # 10 blocks * ~30s per block with 4 workers ≈ 5 min. 8-min ceiling
    # is a safety net; the collector itself should exit well before this.
    timeout-minutes: 8
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Run collector
        env:
          API_BASE: ${{ github.event.inputs.api_base || 'https://dom4in.net' }}
          ADMIN_API_KEY: ${{ secrets.ADMIN_API_KEY }}
          COLLECTOR_CLOUD_STATE: '1'
          COLLECTOR_SOURCE: github-actions
          COLLECTOR_MAX_BLOCKS: ${{ github.event.inputs.blocks || '10' }}
        run: python collector/collector.py --short --pause 0 --workers 4
