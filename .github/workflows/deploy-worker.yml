name: Deploy Worker

on:
  push:
    branches: [ main ]
    paths:
      - 'backend/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install wrangler
        run: npm install -g wrangler@4

      - name: Deploy Worker
        working-directory: backend
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: wrangler deploy

      # Cross-project pattern: every workflow ends with this same snippet so
      # silent CI failures surface as a deduped GitHub issue (and an email).
      # Copy this block (and the `permissions: issues: write`) into any new
      # workflow you add.
      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        env:
          WORKFLOW_NAME: ${{ github.workflow }}
        with:
          script: |
            const { owner, repo } = context.repo;
            const wf = process.env.WORKFLOW_NAME || 'workflow';
            const label = 'automation-failure';
            const ts = new Date().toISOString();
            const runUrl = `https://github.com/${owner}/${repo}/actions/runs/${context.runId}`;
            const body = [
              `Workflow **${wf}** failed.`,
              ``,
              `- Time: ${ts}`,
              `- Run: ${runUrl}`,
              `- Trigger: ${context.eventName}`,
            ].join('\n');

            const open = await github.rest.issues.listForRepo({
              owner, repo, state: 'open', labels: label, per_page: 30,
            });
            const existing = open.data.find(i => i.title === `[${wf}] failing`);
            if (existing) {
              await github.rest.issues.createComment({
                owner, repo, issue_number: existing.number, body,
              });
            } else {
              await github.rest.issues.create({
                owner, repo,
                title: `[${wf}] failing`,
                body,
                labels: [label],
              });
            }
