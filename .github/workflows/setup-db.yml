name: '[setup] DB Migration'

# Apply backend/db/schema.sql against the remote D1 database. Optionally
# run an additional migration file (any .sql under backend/db/migrations/).
# Idempotent — schema uses IF NOT EXISTS everywhere.
#
# Trigger manually from the Actions tab whenever the schema changes.
# Replaces the local `wrangler d1 execute` step.

on:
  workflow_dispatch:
    inputs:
      migration_file:
        description: 'Additional migration file under backend/db/migrations/ (optional, e.g. 001_drop_brand_tables.sql)'
        required: false
        default: ''
      apply_schema:
        description: 'Apply backend/db/schema.sql (the main schema)'
        required: false
        default: 'true'

concurrency:
  group: setup-db
  cancel-in-progress: false

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install wrangler
        run: npm install -g wrangler@4

      - name: Apply main schema
        if: github.event.inputs.apply_schema != 'false'
        working-directory: backend
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: wrangler d1 execute DOM4IN_DB --remote --file=./db/schema.sql

      - name: Apply additional migration file
        if: github.event.inputs.migration_file != ''
        working-directory: backend
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: wrangler d1 execute DOM4IN_DB --remote --file=./db/migrations/${{ github.event.inputs.migration_file }}

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v9
        env:
          WORKFLOW_NAME: ${{ github.workflow }}
        with:
          script: |
            const { owner, repo } = context.repo;
            const wf = process.env.WORKFLOW_NAME || 'workflow';
            const label = 'automation-failure';
            const ts = new Date().toISOString();
            const runUrl = `https://github.com/${owner}/${repo}/actions/runs/${context.runId}`;
            const body = [
              `Workflow **${wf}** failed.`,
              ``,
              `- Time: ${ts}`,
              `- Run: ${runUrl}`,
              `- Trigger: ${context.eventName}`,
            ].join('\n');
            const open = await github.rest.issues.listForRepo({
              owner, repo, state: 'open', labels: label, per_page: 30,
            });
            const existing = open.data.find(i => i.title === `[${wf}] failing`);
            if (existing) {
              await github.rest.issues.createComment({
                owner, repo, issue_number: existing.number, body,
              });
            } else {
              await github.rest.issues.create({
                owner, repo,
                title: `[${wf}] failing`,
                body,
                labels: [label],
              });
            }
