name: Cleanup v3 (one-shot)

# One-time cleanup workflow. Trigger manually from the Actions tab.
# - Drops deprecated brand_watchlist + brand_match_event tables in D1.
# - Removes the CZDS tombstone files from git and pushes the commit.
# Safe to re-run (DROP IF EXISTS, file-existence guard before git rm).
#
# Delete this workflow file after a successful run.

on:
  workflow_dispatch:

permissions:
  contents: write     # needed to git push the cleanup commit
  issues: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # Need full history so the commit lands on main, not a detached HEAD.
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install wrangler
        run: npm install -g wrangler@4

      - name: Drop deprecated brand tables in D1
        working-directory: backend
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          wrangler d1 execute DOM4IN_DB --remote --file=./db/migrations/001_drop_brand_tables.sql

      - name: Remove CZDS tombstone files
        run: |
          set -e
          REMOVED=0
          if [ -f collector/czds_ingest.py ]; then
            git rm -f collector/czds_ingest.py
            REMOVED=1
          fi
          if [ -f .github/workflows/czds.yml ]; then
            git rm -f .github/workflows/czds.yml
            REMOVED=1
          fi
          echo "removed=$REMOVED" >> "$GITHUB_OUTPUT"
        id: rm_tombstones

      - name: Commit and push if anything was removed
        if: steps.rm_tombstones.outputs.removed == '1'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: remove CZDS tombstones (cleanup-v3)"
          git push

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        env:
          WORKFLOW_NAME: ${{ github.workflow }}
        with:
          script: |
            const { owner, repo } = context.repo;
            const wf = process.env.WORKFLOW_NAME || 'workflow';
            const label = 'automation-failure';
            const ts = new Date().toISOString();
            const runUrl = `https://github.com/${owner}/${repo}/actions/runs/${context.runId}`;
            const body = [
              `Workflow **${wf}** failed.`,
              ``,
              `- Time: ${ts}`,
              `- Run: ${runUrl}`,
              `- Trigger: ${context.eventName}`,
            ].join('\n');
            const open = await github.rest.issues.listForRepo({
              owner, repo, state: 'open', labels: label, per_page: 30,
            });
            const existing = open.data.find(i => i.title === `[${wf}] failing`);
            if (existing) {
              await github.rest.issues.createComment({
                owner, repo, issue_number: existing.number, body,
              });
            } else {
              await github.rest.issues.create({
                owner, repo,
                title: `[${wf}] failing`,
                body,
                labels: [label],
              });
            }
