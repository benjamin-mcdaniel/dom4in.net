name: CZDS Ingest

# Nightly ICANN CZDS zone-file diff. Produces:
#   - zone_diff_daily aggregate rows in D1 (public stats fuel)
#   - per-TLD snapshots in R2 (private; never exposed publicly)
#   - brand_match_event rows in D1 for any active watchlist hits
#
# Requires the following repo secrets (see README "Manual setup"):
#   CZDS_USERNAME, CZDS_PASSWORD           — ICANN portal account
#   ADMIN_API_KEY                          — dom4in backend admin key
#   R2_ACCOUNT_ID, R2_ACCESS_KEY_ID,
#   R2_SECRET_ACCESS_KEY, R2_BUCKET        — Cloudflare R2 (for diff history)
#
# Without CZDS_* the workflow exits cleanly (no-op). Without R2_* it falls
# back to /tmp which means each run will treat every domain as "new" since
# yesterday's snapshot won't survive — fine for one-shot testing, useless
# for trends. Configure R2 before turning on the cron.

on:
  schedule:
    - cron: '17 5 * * *'   # 05:17 UTC daily — off-peak for ICANN's API
  workflow_dispatch:
    inputs:
      include_com:
        description: 'Include .com zone (very large — only if needed)'
        required: false
        default: 'false'
      api_base:
        description: 'Override API base URL'
        required: false
        default: 'https://dom4in.net'

concurrency:
  group: czds-ingest
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Guard — skip cleanly if credentials are missing
        id: guard
        env:
          CZDS_USERNAME: ${{ secrets.CZDS_USERNAME }}
          CZDS_PASSWORD: ${{ secrets.CZDS_PASSWORD }}
        run: |
          if [ -z "$CZDS_USERNAME" ] || [ -z "$CZDS_PASSWORD" ]; then
            echo "CZDS credentials not configured; exiting cleanly."
            echo "skip=1" >> "$GITHUB_OUTPUT"
          else
            echo "skip=0" >> "$GITHUB_OUTPUT"
          fi

      - name: Run CZDS ingest
        if: steps.guard.outputs.skip == '0'
        env:
          CZDS_USERNAME: ${{ secrets.CZDS_USERNAME }}
          CZDS_PASSWORD: ${{ secrets.CZDS_PASSWORD }}
          CZDS_INCLUDE_COM: ${{ github.event.inputs.include_com == 'true' && '1' || '0' }}
          API_BASE: ${{ github.event.inputs.api_base || 'https://dom4in.net' }}
          ADMIN_API_KEY: ${{ secrets.ADMIN_API_KEY }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: python collector/czds_ingest.py

      # Same dedup'd-issue failure pattern used by the other workflows.
      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        env:
          WORKFLOW_NAME: ${{ github.workflow }}
        with:
          script: |
            const { owner, repo } = context.repo;
            const wf = process.env.WORKFLOW_NAME || 'workflow';
            const label = 'automation-failure';
            const ts = new Date().toISOString();
            const runUrl = `https://github.com/${owner}/${repo}/actions/runs/${context.runId}`;
            const body = [
              `Workflow **${wf}** failed.`,
              ``,
              `- Time: ${ts}`,
              `- Run: ${runUrl}`,
              `- Trigger: ${context.eventName}`,
            ].join('\n');

            const open = await github.rest.issues.listForRepo({
              owner, repo, state: 'open', labels: label, per_page: 30,
            });
            const existing = open.data.find(i => i.title === `[${wf}] failing`);
            if (existing) {
              await github.rest.issues.createComment({
                owner, repo, issue_number: existing.number, body,
              });
            } else {
              await github.rest.issues.create({
                owner, repo,
                title: `[${wf}] failing`,
                body,
                labels: [label],
              });
            }
