name: '[auto] ICANN Reports'

# Monthly pull of ICANN's per-registrar transaction reports. Public data,
# no credentials required. Idempotent — re-runs of the same month upsert.

on:
  schedule:
    - cron: '23 11 5 * *'   # 11:23 UTC on the 5th of each month
  workflow_dispatch:
    inputs:
      month:
        description: 'Backfill a single month YYYY-MM (optional)'
        required: false
      months_back:
        description: 'How many recent months to attempt (default 3)'
        required: false
        default: '3'
      api_base:
        description: 'Override API base URL'
        required: false
        default: 'https://dom4in.net'

concurrency:
  group: icann-reports
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Run ICANN report ingest
        env:
          API_BASE: ${{ github.event.inputs.api_base || 'https://dom4in.net' }}
          ADMIN_API_KEY: ${{ secrets.ADMIN_API_KEY }}
        run: |
          if [ -n "${{ github.event.inputs.month }}" ]; then
            python collector/icann_registrar_reports.py --month "${{ github.event.inputs.month }}"
          else
            python collector/icann_registrar_reports.py --months-back "${{ github.event.inputs.months_back || '3' }}"
          fi
      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        env:
          WORKFLOW_NAME: ${{ github.workflow }}
        with:
          script: |
            const { owner, repo } = context.repo;
            const wf = process.env.WORKFLOW_NAME || 'workflow';
            const label = 'automation-failure';
            const ts = new Date().toISOString();
            const runUrl = `https://github.com/${owner}/${repo}/actions/runs/${context.runId}`;
            const body = [
              `Workflow **${wf}** failed.`,
              ``,
              `- Time: ${ts}`,
              `- Run: ${runUrl}`,
              `- Trigger: ${context.eventName}`,
            ].join('\n');
            const open = await github.rest.issues.listForRepo({
              owner, repo, state: 'open', labels: label, per_page: 30,
            });
            const existing = open.data.find(i => i.title === `[${wf}] failing`);
            if (existing) {
              await github.rest.issues.createComment({
                owner, repo, issue_number: existing.number, body,
              });
            } else {
              await github.rest.issues.create({
                owner, repo,
                title: `[${wf}] failing`,
                body,
                labels: [label],
              });
            }
